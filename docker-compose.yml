services:
  postgres:
    image: postgres:16-alpine
    container_name: roastek-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-roastek}
      POSTGRES_USER: ${POSTGRES_USER:-roastek}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - roastek-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-roastek} -d ${POSTGRES_DB:-roastek}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: roastek-backend
    restart: unless-stopped
    environment:
      PORT: 3001
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:${WEB_PORT:-8088},http://127.0.0.1:${WEB_PORT:-8088}}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      DATABASE_URL: postgresql://${POSTGRES_USER:-roastek}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-roastek}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      DB_CONNECT_RETRIES: ${DB_CONNECT_RETRIES:-20}
      DB_CONNECT_RETRY_DELAY_MS: ${DB_CONNECT_RETRY_DELAY_MS:-1000}
      LEGACY_DEVICES_FILE: /app/data/devices.json
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - roastek-data:/app/data:ro
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/healthz').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: roastek-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8088}:80"

volumes:
  roastek-pg-data:
  roastek-data:
